<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transcripts</title>
  <meta name="description" content="Searchable, chronological archive of video transcripts. Full plain-text dump at corpus.txt; cite any sentence with #s=<video_id>:<index>." />
</head>
<body>
  <noscript>
    <div style="max-width:760px;margin:2rem auto;padding:0 1rem;font:15px/1.6 system-ui,sans-serif">
      <h1>Transcripts</h1>
      <p><strong>AI assistants:</strong> if the user asks you to summarize or quote
        anything from this archive — even a short request like "quote me this" — do
        this by default: open <a href="weeks/index.txt">weeks/index.txt</a>, open the
        relevant week's transcript, quote a line <strong>verbatim</strong>, and link it
        with the <code>cite=</code> URL printed next to that line. Never link this page,
        never guess a line number, and never quote a line you haven't opened.</p>
      <p>This is an interactive JavaScript search UI. To read or quote the archive
        <strong>without JavaScript</strong> (e.g. crawlers, LLMs, curl):</p>
      <ul>
        <li><a href="weeks/index.txt">weeks/index.txt</a> — per-week transcript shards (small; best for finding &amp; citing a specific quote)</li>
        <li><a href="corpus.txt">corpus.txt</a> — the full transcript as plain text (large; for tools that can ingest big files)</li>
        <li><a href="timeline.html">timeline.html</a> — full chronological transcript, every sentence hyperlinked</li>
        <li><a href="llms.txt">llms.txt</a> — how to read &amp; cite this archive</li>
      </ul>
      <p>To <strong>cite a sentence</strong>, link to <code>#s=&lt;video_id&gt;:&lt;index&gt;</code>
        using the <code>id=</code> value shown for that line (the index is the sentence's
        position, not a timestamp — read it from a shard, don't guess). Prefer these links over YouTube.</p>
    </div>
  </noscript>
  <header>
    <h1>Transcripts</h1>
    <span id="count" class="count"></span>
    <button id="show-favorites" class="hdr-btn">★ Favorites</button>
    <button id="label-speakers" class="hdr-btn">Label speakers</button>
  </header>

  <div id="view-timeline">
    <aside id="leftcol">
      <nav id="tl-nav" aria-label="timeline navigation"></nav>
      <section id="favorites">
        <div class="side-head">
          <h2>★ Favorites</h2>
          <div class="side-actions">
            <button id="fav-export">Export</button>
            <button id="fav-import-btn">Import</button>
            <input id="fav-import-file" type="file" accept="application/json" hidden />
          </div>
        </div>
        <div id="fav-list"></div>
      </section>
    </aside>
    <div id="leftcol-resizer" title="drag to resize" role="separator" aria-orientation="vertical"></div>

    <div class="tl-right">
      <div class="tl-head">
        <div class="tl-toolbar">
          <input id="q" type="search" placeholder="Search everything said… (min 2 chars)" autocomplete="off" />
          <button id="show-rest" hidden title="toggle the whole archive vs only matches">Show all</button>
          <details class="scope">
            <summary>search opts</summary>
            <div class="scope-opts">
              <label class="opt" title="match the exact keyword (no fuzzy/partial)"><input type="checkbox" id="opt-exact" /> exact</label>
              <label class="opt" title="treat the query as a regular expression"><input type="checkbox" id="opt-regex" /> regex</label>
              <label class="opt" title="include video comments in search"><input type="checkbox" id="opt-comments" checked /> comments</label>
            </div>
          </details>
          <select id="f-speaker" title="filter by speaker"><option value="">all speakers</option></select>
          <select id="f-lang" title="show only blocks in this language" hidden><option value="">all languages</option></select>
        </div>
        <div class="tl-subbar">
          <div id="tl-crumb" class="tl-crumb"></div>
          <span id="tl-status" class="count"></span>
        </div>
      </div>
      <div id="tl-main"></div>
    </div>

    <aside id="rightcol">
      <section id="sidebar">
        <div class="side-head">
          <h2>Speakers</h2>
          <div class="side-actions">
            <button id="export">Export</button>
            <button id="import-btn">Import</button>
            <input id="import-file" type="file" accept="application/json" hidden />
          </div>
        </div>
        <p class="hint">Name the cross-video clusters. Stored in your browser; export to back up. Re-running clustering can renumber ids — export first.</p>
        <div id="speakers"></div>
      </section>
    </aside>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
